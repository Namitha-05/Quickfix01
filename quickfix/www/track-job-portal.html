<h2>Track Your Job</h2>

<!-- Search Form -->
<form method="GET">
    <input type="text" name="job_id" placeholder="Enter Job ID">
    <button type="submit">Search</button>
</form>

<hr>

<!-- Results Section -->
{% if job %}

<h3>Job Details</h3>

<p>Job ID: {{ job.name }}</p>
<p>Customer: {{ job.customer_name }}</p>
<p>Status: {{ job.status }}</p>

{% endif %}

<!-- Error Message -->
{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}
